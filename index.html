<html lang="zh-CN"><!-- 
  互动课件：圭表寻影记 (纯几何核心物理版)
  特色功能：
    1. 太阳在以"圭表顶端"为圆心的圆弧轨道上移动。
    2. 直线完美贯穿"太阳中心 -> 圭表顶端 -> 阴影底端"，绝无偏移，旋转中心始终在圭表顶端。
    3. 拖拽太阳时只在轨道上移动，并实时驱动影长变化。
    4. 点击节气精准定位古代实测影长数据。
--><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>圭表寻影记 - 纯几何核心版</title>
    <script src="https://data.aix101.com/cdn/npm/@tailwindcss/3.4.17.js"></script>
    <link rel="stylesheet" href="https://data.aix101.com/cdn/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f5f7fb; font-family: 'Microsoft YaHei', sans-serif; touch-action: none; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .interactive-ui { pointer-events: auto; }
        
        .term-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); text-shadow: 1px 1px 2px rgba(0,0,0,0.4); }
        .term-btn:hover { transform: translateY(-3px) scale(1.05); }
        .term-btn:active { transform: translateY(1px); }
        .glow-active { animation: pulse-gold 1.5s infinite; border: 2px solid #FFD700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.8); z-index: 20;}
        
        @keyframes pulse-gold {
            0% { box-shadow: 0 0 5px #FFD700; }
            50% { box-shadow: 0 0 20px #FFD700; }
            100% { box-shadow: 0 0 5px #FFD700; }
        }

        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="select-none">

    <div id="canvas-container" class="">
        <canvas id="mainCanvas"></canvas>
    </div>

    <div id="ui-layer" class="flex flex-col justify-between p-4 md:p-6">
        <!-- 顶部信息区 -->
        <div class="flex justify-start items-start">
            <div class="interactive-ui bg-white/95 backdrop-blur rounded-2xl shadow-xl border-t-4 border-blue-500 p-6 min-w-[280px]" style="position: relative; transform: translate(0, 12px);">
                <div class="text-center mb-4">
                    <span class="bg-blue-100 text-blue-800 text-sm font-bold px-4 py-1.5 rounded-full uppercase tracking-wider">实时监测仪</span>
                </div>
                <div class="space-y-5">
                    <div class="">
                        <p class="text-gray-500 text-sm font-bold mb-1">当前影长</p>
                        <p class="text-4xl font-black text-gray-800 tracking-tight"><span id="ui-length" class="text-blue-600">--</span> <span class="text-lg text-gray-500">厘米</span></p>
                    </div>
                    <div class="flex gap-5">
                        <div class="flex-1">
                            <p class="text-gray-500 text-sm font-bold mb-1">推算高度角</p>
                            <p class="text-2xl font-bold text-orange-500"><span id="ui-angle" class="">--</span>°</p>
                        </div>
                        <div class="flex-1">
                            <p class="text-gray-500 text-sm font-bold mb-1">最近节气</p>
                            <p class="text-xl font-bold text-green-600" id="ui-near-term">--</p>
                        </div>
                    </div>
                </div>
                <div class="mt-5 pt-4 border-t border-gray-200">
                    <div class="flex items-center gap-2 text-sm text-gray-600">
                        <i class="fa-solid fa-hand-pointer text-blue-500"></i>
                        <span>拖动太阳改变影长</span>
                    </div>
                </div>
            </div>
        </div>


    </div>



    <script>
        // 古代二十四节气影长实测数据 (厘米) - 更新为准确数据
        const solarData = [
            {name:"冬至", length:135.0, color:"#2E5C8A"}, {name:"小寒", length:125.0, color:"#4A7BA7"}, {name:"大寒", length:115.0, color:"#5D8AA8"},
            {name:"立春", length:105.5, color:"#6B9EB8"}, {name:"雨水", length:95.0, color:"#87CEEB"}, {name:"惊蛰", length:85.0, color:"#98D8C8"},
            {name:"春分", length:75.5, color:"#90EE90"}, {name:"清明", length:65.0, color:"#7FCD7F"}, {name:"谷雨", length:57.0, color:"#6BBF6B"},
            {name:"立夏", length:45.0, color:"#FFD700"}, {name:"小满", length:35.0, color:"#FFA500"}, {name:"芒种", length:25.0, color:"#FF8C00"},
            {name:"夏至", length:16.0, color:"#FF4500"}, {name:"小暑", length:25.0, color:"#FF6B35"}, {name:"大暑", length:35.0, color:"#FF8C42"},
            {name:"立秋", length:45.0, color:"#D2691E"}, {name:"处暑", length:57.0, color:"#CD853F"}, {name:"白露", length:65.0, color:"#DEB887"},
            {name:"秋分", length:75.5, color:"#F4A460"}, {name:"寒露", length:85.0, color:"#BC8F8F"}, {name:"霜降", length:95.0, color:"#A0522D"},
            {name:"立冬", length:105.5, color:"#8B4513"}, {name:"小雪", length:115.0, color:"#6F4E37"}, {name:"大雪", length:125.0, color:"#5D4E37"}
        ].map(d => {
            let desc = "";
            if(d.name === "冬至") desc = "冬至大如年，影子最长 135 厘米，这一天北半球白天最短、黑夜最长。";
            else if(d.name === "夏至") desc = "夏至一阴生，影子最短仅 16 厘米，这一天北半球白天最长、黑夜最短。";
            else if(d.name.includes("分")) desc = "昼夜平分，影子刚好" + d.length + "厘米，天气不冷也不热哦。";
            else desc = `古人观察到此时影子长度大约是 ${d.length} 厘米，以此来安排农事劳作。`;
            return { ...d, desc };
        });

        class AudioController {
            constructor() { /* 音频已禁用 */ }
            init() { /* 音频已禁用 */ }
            startDragSound() { /* 音频已禁用 */ }
            updateDragSound(len) { /* 音频已禁用 */ }
            stopDragSound() { /* 音频已禁用 */ }
            playDing() { /* 音频已禁用 */ }
        }
        const audioCtrl = new AudioController();

        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        // 渲染与定位参数
        let width, height;
        let base_x, base_y; 
        let trackRadius;
        const TABLE_HEIGHT = 150; // 圭表高度放大 (像素)
        const PX_PER_INCH = 3.5;  // 影长比例也略微放大

        // 【唯一核心状态】——当前影长
        let currentLength = 75.5; 
        let targetLength = 75.5;
        
        let isDragging = false;
        let isAnimating = false;
        let activeTerms = [];
        let physicsState = null; // 存放帧级推演后的坐标集合

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            // 地面高度，稍微抬高一点
            base_y = height - Math.max(200, height * 0.28); 
            
            // 表顶位置更靠右，为更大的圭尺和太阳轨道留出空间
            base_x = Math.max(500, width * 0.7);
            if (base_x > width - 120) base_x = width - 120;
            
            // 太阳轨道以【圭表顶端】为圆心
            const gnomonTopY = base_y - TABLE_HEIGHT;
            
            // 严格计算最大半径，确保太阳在任何角度都不会超出屏幕
            const maxTrackTop = gnomonTopY - 80; // 上边距
            const maxTrackRight = (width - base_x - 80); // 右边距
            const maxTrackLeft = base_x - 100; // 左边距
            // 轨道角度范围大约在15°到75°之间，取最苛刻的约束
            const angleMinRad = 15 * Math.PI / 180;
            const angleMaxRad = 75 * Math.PI / 180;
            const radiusFromLeft = maxTrackLeft / Math.cos(angleMaxRad);
            const radiusFromRight = maxTrackRight / Math.cos(angleMinRad);
            
            trackRadius = Math.min(maxTrackTop, radiusFromLeft, radiusFromRight, width * 0.45);
            if (trackRadius < 200) trackRadius = 200;
        }

        window.addEventListener('resize', resize);
        resize();

        /**
         * 【核心物理与几何求解器】
         * 输入：当前影长 (寸)
         * 输出：完美的共线坐标组与真实物理角度
         */
        function solvePhysics(len) {
            // 1. 基准支点：圭表顶端
            const gnomonTop = { x: base_x, y: base_y - TABLE_HEIGHT };
            
            // 2. 推导阴影底端 (向左水平延伸)
            const shadowTipX = base_x - (len * PX_PER_INCH);
            const shadowTip = { x: shadowTipX, y: base_y };
            
            // 3. 计算直线的倾角 (光线相对于地平线的夹角)
            const dx = gnomonTop.x - shadowTip.x;
            const dy = shadowTip.y - gnomonTop.y; // 就是 TABLE_HEIGHT
            const rad = Math.atan2(dy, dx); 
            
            // 4. 根据角度，在以表顶为圆心的轨道上推导太阳位置
            // 保证太阳、表顶、影尖100%处于同一直线！
            const sunPos = {
                x: gnomonTop.x + trackRadius * Math.cos(rad),
                y: gnomonTop.y - trackRadius * Math.sin(rad)
            };

            return { gnomonTop, shadowTip, sunPos, rad, angleDeg: rad * 180 / Math.PI };
        }

        function drawBackground() {
            const skyGrd = ctx.createLinearGradient(0, 0, 0, height);
            skyGrd.addColorStop(0, '#1E90FF'); skyGrd.addColorStop(0.5, '#87CEEB'); skyGrd.addColorStop(1, '#FFDAB9');
            ctx.fillStyle = skyGrd; ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = '#90EE90'; ctx.beginPath();
            ctx.moveTo(0, height); ctx.lineTo(0, base_y - 10);
            ctx.quadraticCurveTo(width * 0.25, base_y + 20, width * 0.5, base_y);
            ctx.quadraticCurveTo(width * 0.75, base_y - 30, width, base_y);
            ctx.lineTo(width, height); ctx.fill();
            
            ctx.fillStyle = '#7CCD7C'; ctx.beginPath();
            ctx.moveTo(0, height); ctx.lineTo(0, base_y + 60);
            ctx.quadraticCurveTo(width * 0.5, base_y + 10, width, base_y + 40);
            ctx.lineTo(width, height); ctx.fill();
        }

        function drawGnomon() {
            const guiWidth = 520; // 圭尺也加长

            // 白色石台底座在最左边
            ctx.fillStyle = '#D3D3D3';
            ctx.fillRect(base_x - guiWidth - 35, base_y, 70, 25);

            // 圭尺向左铺设
            ctx.fillStyle = '#FAF9F6';
            ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 3;
            ctx.fillRect(base_x - guiWidth, base_y - 6, guiWidth, 18);
            ctx.shadowBlur = 0;

            // 刻度
            ctx.fillStyle = '#333';
            ctx.font = 'bold 14px "Comic Sans MS", sans-serif'; // 字体稍大
            ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            for (let inch = 0; inch <= 150; inch += 5) {
                const px = base_x - inch * PX_PER_INCH;
                if (px < base_x - guiWidth) break;
                ctx.beginPath();
                if (inch % 10 === 0) {
                    ctx.moveTo(px, base_y - 6);
                    ctx.lineTo(px, base_y - 18);
                    ctx.stroke();
                    if(inch > 0) {
                        ctx.fillStyle = 'white';
                        ctx.fillText(inch.toString(), px+1, base_y - 32);
                        ctx.fillText(inch.toString(), px-1, base_y - 32);
                        ctx.fillStyle = '#000';
                        ctx.fillText(inch.toString(), px, base_y - 32);
                    }
                } else {
                    ctx.moveTo(px, base_y - 6);
                    ctx.lineTo(px, base_y - 12);
                    ctx.stroke();
                }
            }

            // 表柱 (立竿)，宽度也增加
            const woodGrd = ctx.createLinearGradient(base_x - 10, 0, base_x + 10, 0);
            woodGrd.addColorStop(0, '#5C2E0B'); woodGrd.addColorStop(0.5, '#A0522D'); woodGrd.addColorStop(1, '#6B3E11');
            ctx.fillStyle = woodGrd;
            ctx.fillRect(base_x - 10, base_y - TABLE_HEIGHT, 20, TABLE_HEIGHT);
            
            // 表顶圆润化
            ctx.beginPath();
            ctx.arc(base_x, base_y - TABLE_HEIGHT, 10, Math.PI, 0); 
            ctx.fill();
        }

        function drawScene() {
            // 实时几何求解
            physicsState = solvePhysics(currentLength);
            const { gnomonTop, shadowTip, sunPos, rad } = physicsState;

            // 1. 绘制轨道虚线圆弧 (以表顶为圆心)
            ctx.save();
            ctx.beginPath();
            ctx.setLineDash([5, 10]);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 2;
            // 轨道范围使用准确的影长数据计算角度
            const radMin = Math.atan2(TABLE_HEIGHT, 135.0 * PX_PER_INCH); // 冬至最长影长对应最小角度
            const radMax = Math.atan2(TABLE_HEIGHT, 16.0 * PX_PER_INCH);  // 夏至最短影长对应最大角度  
            ctx.arc(gnomonTop.x, gnomonTop.y, trackRadius, -radMax, -radMin, false);
            ctx.stroke();
            ctx.restore();

            // 2. 绘制影子体
            // 先绘制非常浅的完整三角形
            ctx.save();
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.4)'; ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.moveTo(base_x, gnomonTop.y + 8);
            ctx.lineTo(base_x, base_y);
            ctx.lineTo(shadowTip.x, shadowTip.y);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
            
            // 再单独绘制与圭尺重合的底部矩形，颜色加深
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(shadowTip.x, base_y - 5, base_x - shadowTip.x, 15);
            ctx.fillStyle = 'red';
            ctx.beginPath(); ctx.arc(shadowTip.x, base_y + 2, 4, 0, Math.PI*2); ctx.fill();

            // 3. 绘制贯穿光线 (直线直连太阳->表顶->影尖)
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.lineWidth = 2.5; 
            ctx.setLineDash([10, 8]);
            ctx.beginPath();
            ctx.moveTo(sunPos.x, sunPos.y);
            ctx.lineTo(gnomonTop.x, gnomonTop.y);
            ctx.lineTo(shadowTip.x, shadowTip.y);
            ctx.stroke();
            ctx.restore();

            // 4. 绘制太阳
            const r = isDragging ? 52 : 42;
            ctx.save();
            ctx.translate(sunPos.x, sunPos.y);
            
            // 光晕
            const time = Date.now() / 300;
            const haloScale = 1 + Math.sin(time) * 0.1;
            for(let i=3; i>0; i--) {
                ctx.beginPath(); ctx.arc(0, 0, r * haloScale + i * 15, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 215, 0, ${0.15 / i})`; ctx.fill();
            }

            // 太阳主体
            const sunGrd = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
            sunGrd.addColorStop(0, '#FFFF00'); sunGrd.addColorStop(0.8, '#FFD700'); sunGrd.addColorStop(1, '#FF8C00');
            ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
            ctx.fillStyle = sunGrd; ctx.shadowColor = '#FF8C00'; ctx.shadowBlur = 20;
            ctx.fill(); ctx.shadowBlur = 0;

            // 太阳表情
            ctx.fillStyle = '#8B4500';
            ctx.beginPath(); ctx.arc(-14, -10, 4.5, 0, Math.PI*2); ctx.arc(14, -10, 4.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.lineWidth = 3; ctx.strokeStyle = '#8B4500'; ctx.lineCap = 'round';
            const smileFactor = (150 - currentLength) / 134; 
            if (smileFactor < 0.2) { ctx.moveTo(-10, 8); ctx.lineTo(10, 8); ctx.stroke(); } 
            else { const curveY = 5 + 10 * smileFactor; ctx.moveTo(-15, 5); ctx.quadraticCurveTo(0, curveY + 10, 15, 5); ctx.stroke(); }
            ctx.restore();

            // 拖拽提示框
            if(isDragging) {
                ctx.fillStyle = 'rgba(255,255,255,0.95)';
                ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = 10;
                ctx.beginPath(); ctx.roundRect(sunPos.x - 45, sunPos.y - r - 55, 90, 32, 16); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#FF4500'; ctx.font = 'bold 14px "Microsoft YaHei"';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(`高度角：${Math.round(physicsState.angleDeg)}°`, sunPos.x, sunPos.y - r - 39);
                // 小箭头
                ctx.beginPath(); ctx.moveTo(sunPos.x - 6, sunPos.y - r - 23); ctx.lineTo(sunPos.x + 6, sunPos.y - r - 23); ctx.lineTo(sunPos.x, sunPos.y - r - 13); ctx.fillStyle = 'rgba(255,255,255,0.95)'; ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // 平滑动画：以影长为单一驱动量进行插值（加快速度）
            if (isAnimating) {
                const diff = targetLength - currentLength;
                if (Math.abs(diff) < 0.2) {
                    currentLength = targetLength;
                    isAnimating = false;
                } else {
                    currentLength += diff * 0.25; // 从0.12提高到0.25，显著加快
                }
            }

            drawBackground();
            drawGnomon();
            drawScene(); 
            
            updateUIPanel();
            checkNearTerms();

            requestAnimationFrame(animate);
        }

        const uiLength = document.getElementById('ui-length');
        const uiAngle = document.getElementById('ui-angle');
        const uiNearTerm = document.getElementById('ui-near-term');
        
        let lastUiData = { l: 0, a: 0, t: '' };
        function updateUIPanel() {
            if(!physicsState) return;
            const l = currentLength.toFixed(1);
            const a = Math.round(physicsState.angleDeg);
            const t = activeTerms.length > 0 ? activeTerms.join(' / ') : '--';
            
            if (l !== lastUiData.l) { uiLength.innerText = l; lastUiData.l = l; }
            if (a !== lastUiData.a) { uiAngle.innerText = a; lastUiData.a = a; }
            if (t !== lastUiData.t) { uiNearTerm.innerText = t; lastUiData.t = t; }
        }

        function checkNearTerms() {
            const newActiveTerms = [];
            solarData.forEach((term) => {
                // 如果当前影长非常接近某节气的数据
                if (Math.abs(term.length - currentLength) <= 1.5) {
                    newActiveTerms.push(term.name);
                }
            });
            
            if (JSON.stringify(activeTerms) !== JSON.stringify(newActiveTerms)) {
                activeTerms = newActiveTerms;
            }
        }

        function getPointerPos(e) {
            if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            return { x: e.clientX, y: e.clientY };
        }

        function handlePointerDown(e) {
            if(e.target.closest('.interactive-ui') || !physicsState) return;
            const pos = getPointerPos(e);
            // 判断是否点中了太阳
            const dist = Math.hypot(pos.x - physicsState.sunPos.x, pos.y - physicsState.sunPos.y);
            if (dist < 70) {
                isDragging = true;
                isAnimating = false;
                audioCtrl.init();
                audioCtrl.startDragSound();
                e.preventDefault();
            }
        }

        function handlePointerMove(e) {
            if (!isDragging || !physicsState) return;
            e.preventDefault();
            const pos = getPointerPos(e);
            
            const gnomonTop = physicsState.gnomonTop;
            
            // 计算鼠标位置相对于【圭表顶端】的夹角
            let mouseRad = Math.atan2(gnomonTop.y - pos.y, pos.x - gnomonTop.x);
            
            // 【核心修正】使用准确的影长数据计算极限角度
            const minShadowLen = 16.0; // 夏至最短影长
            const maxShadowLen = 135.0; // 冬至最长影长
            const radMin = Math.atan2(TABLE_HEIGHT, maxShadowLen * PX_PER_INCH); // 影子最长时，角度最小
            const radMax = Math.atan2(TABLE_HEIGHT, minShadowLen * PX_PER_INCH); // 影子最短时，角度最大
            
            // 将鼠标角度钳制在合法范围内
            mouseRad = Math.max(radMin, Math.min(radMax, mouseRad));
            
            // 根据夹角，反推地面的影子长度
            const dx = TABLE_HEIGHT / Math.tan(mouseRad);
            let newLen = dx / PX_PER_INCH;
            
            // 双重保险：再次将影长钳制在16-135之间
            newLen = Math.max(minShadowLen, Math.min(maxShadowLen, newLen));
            
            currentLength = newLen;
            targetLength = newLen;
            audioCtrl.updateDragSound(currentLength);
        }

        function handlePointerUp() {
            if (isDragging) {
                isDragging = false;
                audioCtrl.stopDragSound();
            }
        }

        canvas.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);
        
        canvas.addEventListener('touchstart', handlePointerDown, {passive: false});
        window.addEventListener('touchmove', handlePointerMove, {passive: false});
        window.addEventListener('touchend', handlePointerUp);

        requestAnimationFrame(animate);
    </script>

</body></html>
